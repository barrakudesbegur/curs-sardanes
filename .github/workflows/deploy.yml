name: Deploy to Cloudflare Workers

# Push-to-deploy (replaces the old Cloudflare Pages git integration). Requires a
# repo secret CLOUDFLARE_API_TOKEN — create it from the "Edit Cloudflare Workers"
# API token template (account ID is pinned in wrangler.jsonc). Remote D1
# migrations are NOT run here; apply them with `npm run db:apply:remote`.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci
      - run: npm run build
        env:
          # Baked into the client at build time (.env is gitignored, so absent in
          # CI). REQUIRED — set a repo variable PUBLIC_WA_NUMBER (Settings →
          # Variables → Actions) to the WhatsApp (test/real) number. No default:
          # if it's missing the build fails loudly instead of shipping a bad link.
          PUBLIC_WA_NUMBER: ${{ vars.PUBLIC_WA_NUMBER }}
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy
